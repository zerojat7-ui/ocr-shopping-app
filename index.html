<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코스트코 쇼핑 계산기</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563ff">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<div class="app">
  <header class="topbar">
    <h1>🛒 코스트코 쇼핑 계산기</h1>
    <button onclick="goHistory()">기록</button>
  </header>

  <div class="upload-actions">
    <button class="actionBtn" onclick="document.getElementById('cameraInput').click()">📷 사진 촬영</button>
    <button class="actionBtn" onclick="document.getElementById('galleryInput').click()">📂 사진 업로드</button>
  </div>

  <input type="file" id="cameraInput" hidden accept="image/*" capture="environment">
  <input type="file" id="galleryInput" hidden accept="image/*">

  <img id="previewImage">

  <div id="productList"></div>
</div>

<footer class="bottomBar">
  <div class="summary">
    <div>
      <p>선택 상품</p>
      <h3 id="itemCount">0개</h3>
    </div>
    <div class="price">
      <span id="grandTotal">0</span>원
    </div>
  </div>
  <button id="saveBtn">기록 저장</button>
  <button id="resetBtn">전체 초기화</button>
</footer>

<div id="editSheet">
  <div class="sheetContent">
    <div class="sheetHandle"></div>
    <h2>상품 수정</h2>
    <input id="sheetName" list="productSuggestions" placeholder="상품명">
    <datalist id="productSuggestions"></datalist>
    <input id="sheetPrice" type="number" placeholder="가격">
    <input id="sheetQty" type="number" placeholder="수량">
    <textarea id="sheetMemo" placeholder="메모"></textarea>
    <button id="saveSheetBtn">저장</button>
  </div>
</div>

<script src="db.js"></script>
<script src="script.js"></script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>
</body>
</html>
